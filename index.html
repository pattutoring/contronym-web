<script>
  // === EDIT ONLY THIS SECTION EACH WEEK ===
  const puzzle = {
    word: "SANCTION",
    hints: [
      { word: "permit", charge: "+" },
      { word: "restrict", charge: "-" },
      { word: "authorize", charge: "+" },
      { word: "penalize", charge: "-" },
      { word: "approve", charge: "+" },
      { word: "punish", charge: "-" }
    ],
    message: "A word that can officially approve or penalize depending on context."
  };

  const word = puzzle.word.toUpperCase();
  let visibleHintCount = 2;

  const answerBoxes = document.getElementById("answer-boxes");
  const hintText = document.getElementById("hint-text");
  const showHintBtn = document.getElementById("show-hint");
  const revealLetterBtn = document.getElementById("reveal-letter");
  const resetBtn = document.getElementById("reset-puzzle");
  const message = document.getElementById("message");

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyk7Kx-U0hQ1k3B5FGVYsrNMIpvksribCqk2-2GT8Bmwoo8PhX1r3gu-bZo747Dr727/exec";

  function logPuzzleEvent(puzzleWord, action, player = "") {
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ puzzle: puzzleWord, action, player })
    }).catch(err => console.error("Logging failed:", err));
  }

  function renderHints() {
    const shownHints = puzzle.hints.slice(0, visibleHintCount);

    const negativeHints = shownHints
      .filter(h => h.charge === "-")
      .map(h => `${h.word}<sup>−</sup>`)
      .join("<br>");

    const positiveHints = shownHints
      .filter(h => h.charge === "+")
      .map(h => `${h.word}<sup>+</sup>`)
      .join("<br>");

    document.getElementById("left-label").innerHTML = negativeHints || "negative";
    document.getElementById("right-label").innerHTML = positiveHints || "positive";
    hintText.textContent = puzzle.message;
  }

  renderHints();
  logPuzzleEvent(word, "page_load");

  for (let i = 0; i < word.length; i++) {
    const box = document.createElement("input");
    box.type = "text";
    box.maxLength = 1;
    box.className = "letter-box";
    box.dataset.index = i;
    answerBoxes.appendChild(box);
  }

  answerBoxes.addEventListener("input", (e) => {
    const target = e.target;
    const index = parseInt(target.dataset.index);
    target.value = target.value.toUpperCase();

    if (target.value.length === 1) {
      const next = answerBoxes.children[index + 1];
      if (next) next.focus();
    }

    checkWord();
  });

  showHintBtn.addEventListener("click", () => {
    if (visibleHintCount < puzzle.hints.length) {
      visibleHintCount++;
      renderHints();
      logPuzzleEvent(word, "hint_word_revealed");
    } else {
      hintText.style.display = "block";
      logPuzzleEvent(word, "full_hint_shown");
    }
  });

  revealLetterBtn.addEventListener("click", () => {
    const boxes = Array.from(answerBoxes.children);
    const unrevealed = boxes.filter((box, i) => box.value.toUpperCase() !== word[i]);
    if (unrevealed.length === 0) return;

    const randomBox = unrevealed[Math.floor(Math.random() * unrevealed.length)];
    const i = parseInt(randomBox.dataset.index);
    randomBox.value = word[i];
    randomBox.classList.add("revealed");

    logPuzzleEvent(word, "letter_revealed", `index_${i}`);
    checkWord();
  });

  resetBtn.addEventListener("click", () => {
    for (let box of answerBoxes.children) {
      box.value = "";
      box.classList.remove("revealed");
    }

    visibleHintCount = 2;
    renderHints();
    hintText.style.display = "none";
    message.textContent = "";

    logPuzzleEvent(word, "reset");
  });

  function checkWord() {
    let current = "";

    for (let box of answerBoxes.children) {
      current += box.value.toUpperCase();
    }

    if (current === word) {
      message.textContent =
        "You’ve found the Majorana of Meaning — one word, two opposite charges.";
      logPuzzleEvent(word, "completed");
    } else {
      message.textContent = "";
    }
  }
</script>
