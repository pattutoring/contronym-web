<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contronym: The Majorana of Meaning</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background-color: #f9f7f2;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 40px;
      margin: 0;
    }

    h1 { font-size: 2.4rem; margin-bottom: 0.2em; }
    h2 { font-style: italic; margin-bottom: 1.5em; text-align: center; }

    .game-container {
      position: relative;
      width: 400px;
      height: 380px;
      margin-bottom: 20px;
      max-width: 94vw;
    }

    .axis { position: absolute; background: #000; }

    .x-axis {
      width: 100%;
      height: 2px;
      bottom: 40px;
      left: 0;
      background: #0057a8;
    }

    .y-axis {
      width: 2px;
      height: 100%;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      background: #b11b2b;
    }

    .label {
      position: absolute;
      font-style: italic;
      font-size: 0.8rem;
      z-index: 3;
      background: rgba(249, 247, 242, 0.82);
      padding: 2px 4px;
      border-radius: 5px;
    }

    .left-label {
      bottom: 215px;
      left: 20px;
      color: #8b1e1e;
      text-align: left;
      line-height: 1.6;
    }

    .right-label {
      bottom: 215px;
      right: 20px;
      color: #0057a8;
      text-align: right;
      line-height: 1.6;
    }

    .x-label {
      bottom: 20px;
      right: 10px;
      color: #0057a8;
    }

    .y-label {
      top: 10px;
      left: 52%;
      color: #b11b2b;
    }

    .parabola-svg {
      position: absolute;
      bottom: -90px;
      left: 0;
      width: 100%;
      height: absolute;
    }

   .majorana-trail {
  position: absolute;
  left: 50%;
  bottom: -12px;
  transform: translateX(-50%);
  pointer-events: none;
  width: 240px;
  height: 100px;
  z-index: 4;
}

    .answer-boxes {
      display: flex;
      gap: 5px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
      max-width: 94vw;
    }

    .letter-box {
      width: 30px;
      height: 30px;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 1rem;
      background-color: white;
      text-align: center;
      text-transform: uppercase;
      border-radius: 4px;
    }

    .revealed { background-color: #e0f7fa; }

    #hint-text {
      font-size: 0.85rem;
      font-style: italic;
      color: #666;
      margin-top: 10px;
      display: none;
      text-align: center;
      max-width: 420px;
      padding: 0 12px;
    }

    #message {
      font-size: 0.9rem;
      color: #008080;
      margin-top: 10px;
      font-style: italic;
      text-align: center;
      max-width: 420px;
      padding: 0 12px;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      font-size: 0.9rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #d8ecf3;
    }

    #reset-puzzle { background-color: #f3d8d8; }

    sup {
      font-weight: 800;
      font-style: normal;
      font-size: 0.72rem;
      margin-left: 2px;
    }
  </style>
</head>

<body>
  <h1>Contronym</h1>
  <h2>The Majorana of Meaning</h2>

  <div class="game-container">
    <div class="axis x-axis"></div>
    <div class="axis y-axis"></div>

    <span class="label left-label" id="left-label"></span>
    <span class="label right-label" id="right-label"></span>
    <span class="label x-label">transverse</span>
    <span class="label y-label">conjugate</span>

    <svg class="parabola-svg" width="400" height="500" viewBox="0 0 400 340">
  <path d="M 120 60 Q 200 340 280 60"
        stroke="#00bfff"
        stroke-width="2"
        stroke-dasharray="6 6"
        fill="none" />
</svg>

    <svg class="majorana-trail" width="240" height="100" viewBox="0 0 240 100">
      <path d="M 10 60 
               C 40 20, 80 100, 120 60 
               S 200 0, 230 60"
            stroke="#888"
            stroke-width="2"
            stroke-dasharray="5 5"
            fill="none" />
      <text x="225" y="65" font-size="20" font-style="italic" font-family="serif" fill="#333">ν</text>
    </svg>
  </div>

  <div class="answer-boxes" id="answer-boxes"></div>

  <button id="show-hint">Reveal Hint Word</button>
  <p id="hint-text"></p>

  <button id="reveal-letter">Reveal a Letter</button>
  <button id="reset-puzzle">Reset Puzzle</button>

  <p id="message"></p>

  <script>
    const puzzle = {
      word: "SANCTION",
      hints: [
        { word: "restrict", charge: "-" },
        { word: "permit", charge: "+" },
        { word: "penalize", charge: "-" },
        { word: "authorize", charge: "+" },
        { word: "punish", charge: "-" },
        { word: "approve", charge: "+" }
      ],
      message: "A word that can officially approve or penalize depending on context."
    };

    const word = puzzle.word.toUpperCase();
    let visibleHintCount = 2;

    document.addEventListener("DOMContentLoaded", () => {
      const answerBoxes = document.getElementById("answer-boxes");
      const hintText = document.getElementById("hint-text");
      const showHintBtn = document.getElementById("show-hint");
      const revealLetterBtn = document.getElementById("reveal-letter");
      const resetBtn = document.getElementById("reset-puzzle");
      const message = document.getElementById("message");
      const leftLabel = document.getElementById("left-label");
      const rightLabel = document.getElementById("right-label");

      function renderHints() {
        const shownHints = puzzle.hints.slice(0, visibleHintCount);

        leftLabel.innerHTML =
          shownHints.filter(h => h.charge === "-")
            .map(h => `${h.word}<sup>−</sup>`)
            .join("<br>") || "negative";

        rightLabel.innerHTML =
          shownHints.filter(h => h.charge === "+")
            .map(h => `${h.word}<sup>+</sup>`)
            .join("<br>") || "positive";

        hintText.textContent = puzzle.message;
        showHintBtn.textContent =
          visibleHintCount >= puzzle.hints.length ? "Show Full Hint" : "Reveal Hint Word";
      }

      function createBoxes() {
        answerBoxes.innerHTML = "";
        for (let i = 0; i < word.length; i++) {
          const box = document.createElement("input");
          box.type = "text";
          box.maxLength = 1;
          box.className = "letter-box";
          box.dataset.index = i;
          answerBoxes.appendChild(box);
        }
      }

      function checkWord() {
        let current = "";
        for (let box of answerBoxes.children) {
          current += box.value.toUpperCase();
        }

        message.textContent =
          current === word
            ? "You’ve found the Majorana of Meaning — one word, two opposite charges."
            : "";
      }

      createBoxes();
      renderHints();

      answerBoxes.addEventListener("input", (e) => {
        const target = e.target;
        const index = parseInt(target.dataset.index);
        target.value = target.value.toUpperCase();

        if (target.value.length === 1) {
          const next = answerBoxes.children[index + 1];
          if (next) next.focus();
        }

        checkWord();
      });

      showHintBtn.addEventListener("click", () => {
        if (visibleHintCount < puzzle.hints.length) {
          visibleHintCount++;
          renderHints();
        } else {
          hintText.style.display = "block";
        }
      });

      revealLetterBtn.addEventListener("click", () => {
        const boxes = Array.from(answerBoxes.children);
        const unrevealed = boxes.filter((box, i) => box.value.toUpperCase() !== word[i]);
        if (unrevealed.length === 0) return;

        const randomBox = unrevealed[Math.floor(Math.random() * unrevealed.length)];
        const i = parseInt(randomBox.dataset.index);

        randomBox.value = word[i];
        randomBox.classList.add("revealed");
        checkWord();
      });

      resetBtn.addEventListener("click", () => {
        for (let box of answerBoxes.children) {
          box.value = "";
          box.classList.remove("revealed");
        }

        visibleHintCount = 2;
        renderHints();
        hintText.style.display = "none";
        message.textContent = "";
      });
    });
  </script>
</body>
</html>
